name: Release

# Публикация GitHub Release по push тега вида v1.2.3.
# Внутри Actions доступен автоматический GITHUB_TOKEN — личный токен не нужен.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write # нужно для создания релиза

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # Секрет нельзя использовать в if:, поэтому наличие keystore определяем в
      # shell-шаге (секрет — через env, это разрешено) и отдаём как output.
      - name: Prepare signing
        id: sign
        env:
          KS_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "has_keystore=true" >> "$GITHUB_OUTPUT"
            echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"
          else
            echo "has_keystore=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed release APK
        if: steps.sign.outputs.has_keystore == 'true'
        env:
          RELEASE_KEYSTORE: ${{ steps.sign.outputs.path }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # Фолбэк, пока секреты подписи не заданы: debug-APK (для «install over»
      # нужна консистентная подпись — задайте секреты и пересоберите релиз).
      - name: Build debug APK (no signing secrets)
        if: steps.sign.outputs.has_keystore != 'true'
        run: ./gradlew assembleDebug --stacktrace

      - name: Collect APK
        id: apk
        run: |
          file=$(find app/build/outputs/apk -name '*.apk' ! -name '*unsigned*' | head -1)
          if [ -z "$file" ]; then echo "APK не найден"; exit 1; fi
          out="ngscanner-${GITHUB_REF_NAME}.apk"
          cp "$file" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.apk.outputs.path }}
