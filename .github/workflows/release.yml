name: Release

# Публикация GitHub Release по push тега вида v1.2.3.
# Внутри Actions доступен автоматический GITHUB_TOKEN — личный токен не нужен.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write # нужно для создания релиза

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # --- Подпись релиза, если заданы секреты репозитория ---
      # RELEASE_KEYSTORE_B64  — keystore (base64)
      # RELEASE_KEYSTORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD
      - name: Decode signing keystore
        id: keystore
        if: ${{ secrets.RELEASE_KEYSTORE_B64 != '' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        if: ${{ secrets.RELEASE_KEYSTORE_B64 != '' }}
        env:
          RELEASE_KEYSTORE: ${{ steps.keystore.outputs.path }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # Фолбэк, пока секреты подписи не заданы: debug-APK (для «install over»
      # нужна консистентная подпись — задайте секреты и пересоберите релиз).
      - name: Build debug APK (no signing secrets)
        if: ${{ secrets.RELEASE_KEYSTORE_B64 == '' }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Collect APK
        id: apk
        run: |
          file=$(find app/build/outputs/apk -name '*.apk' ! -name '*unsigned*' | head -1)
          if [ -z "$file" ]; then echo "APK не найден"; exit 1; fi
          out="ngscanner-${GITHUB_REF_NAME}.apk"
          cp "$file" "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.apk.outputs.path }}
